--
-- --- Conky configuration
-- AMD Ryzen AI HX 370 / Radeon 890M / Arch Linux / XFCE
-- Aesthetic: btop-inspired, teal/cyan on near-black, ASCII-safe characters only
--

conky.config = {

    alignment          = 'middle_right',
    gap_x              = 15,
    gap_y              = 0,
    xinerama_head      = 1,
    minimum_width      = 430,
    maximum_width      = 430,

    own_window         = true,
    own_window_type    = 'override',    -- bypasses compositor, truly opaque
    own_window_hints   = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_argb_visual = true,      -- must stay true or text disappears
    own_window_argb_value  = 255,
    own_window_colour      = '#0d0f12',
    own_window_transparent = false,

    double_buffer      = true,

    update_interval    = 2.0,
    cpu_avg_samples    = 2,
    net_avg_samples    = 2,

    use_xft            = true,
    font               = 'Noto Sans Mono:size=9',
    xftalpha           = 1.0,

    -- Colours indexed by significance (1 = most prominent)
    -- ${color}  = white   -- values
    -- ${color1} = teal    -- section headers
    -- ${color2} = slate   -- labels
    -- ${color3} = skyblue -- wifi SSID accent
    default_color      = '#c9d1d9',
    color1             = '#2dd4bf',
    color2             = '#94a3b8',
    color3             = '#7dd3fc',

    draw_borders       = false,
    draw_outline       = false,
    draw_shades        = false,
    border_width       = 0,
    no_buffers         = true,
    short_units        = true,
    pad_percents       = 0,
    use_spacer         = 'none',

}

--
-- Layout
-- Window: 430px @ ~9px/char (Noto Sans Mono size 9)
-- Graphs: 60px tall, 412px wide
-- Each section: graph or bar (full width), then one info line below it
--   left  = label (temp, state)
--   right = current value (%, used/total) via ${alignr 9}
--

conky.text = [[
${color1}== SYSTEM =================================================${color}
 ${color2}Host.  ${color}${nodename}
 ${color2}Kernel ${color}${kernel}
 ${color2}Up     ${color}${uptime}

${color1}== BATTERY ================================================${color}
 ${execgraph ~/.local/bin/conky-battery 60,412}
 ${execpi 30 cat /sys/class/power_supply/BAT1/status | tr '[:upper:]' '[:lower:]'}${alignr 9}${execpi 30 ~/.local/bin/conky-battery}%

${color1}== MEMORY =================================================${color}
 ${memgraph 60,412}
${alignr 9}${mem} / ${memmax}

${color1}== CPU ====================================================${color}
 ${cpugraph cpu0 60,412}
 ${color2}Temp. ${color}${execpi 5 ~/.local/bin/conky-cpu-temp}${alignr 9}${cpu cpu0}%

${color1}== GPU ====================================================${color}
 ${execgraph ~/.local/bin/conky-gpu 60,412}
 ${color2}Temp. ${color}${execpi 5 ~/.local/bin/conky-gpu-temp}${alignr 9}${execpi 3 ~/.local/bin/conky-gpu}%

${color1}== DISK ===================================================${color}
 ${fs_bar 7,412 /}
${alignr 9}${fs_used /} / ${fs_size /}

${color1}== NETWORK ================================================${color}
${alignc}${color2}Active ${color}${execpi 5 ip route show default | awk '{print $5; exit}'}

 ${color2}wifi  ${color}wlp192s0 ${color3}${wireless_essid wlp192s0}${color}${goto 290}${color2}eth.  ${color}usbeth0
 ${color2}Up    ${color}${upspeed wlp192s0}${goto 290}${color2}Up    ${color}${upspeed usbeth0}
 ${color2}Down  ${color}${downspeed wlp192s0}${goto 290}${color2}Down  ${color}${downspeed usbeth0}
 ${color2}In    ${color}${totaldown wlp192s0}${goto 290}${color2}In    ${color}${totaldown usbeth0}
 ${color2}Out   ${color}${totalup wlp192s0}${goto 290}${color2}Out   ${color}${totalup usbeth0}
${color1}===========================================================${color}
]]
